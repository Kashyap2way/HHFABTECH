<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 | Page Not Found - HH FABTECH</title>

    <meta name="description" content="The page you are looking for could not be found.">

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>

        body{

            margin:0;
            padding:0;
            font-family:'Poppins',sans-serif;
            background:linear-gradient(rgba(67,35,111,.90),rgba(67,35,111,.90)),
            url("assets/images/hero/hero1.png");
            background-size:cover;
            background-position:center;
            color:#fff;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
            text-align:center;

        }

        .error-box{

            width:90%;
            max-width:700px;

        }

        .error-box h1{

            font-size:160px;
            margin:0;
            color:#F4B400;
            line-height:1;

        }

        .error-box h2{

            font-size:42px;
            margin:20px 0;

        }

        .error-box p{

            font-size:18px;
            line-height:1.8;
            margin-bottom:40px;

        }

        .btn404{

            display:inline-block;

            padding:16px 40px;

            background:#F4B400;

            color:#222;

            font-weight:600;

            border-radius:40px;

            text-decoration:none;

            transition:.3s;

        }

        .btn404:hover{

            background:#ffffff;

        }

        .countdown{

            margin-top:30px;

            opacity:.8;

        }

        @media(max-width:768px){

            .error-box h1{

                font-size:110px;

            }

            .error-box h2{

                font-size:28px;

            }

            .error-box p{

                font-size:16px;

            }

        }

    </style>

</head>

<body>

    <div class="error-box">

        <h1>404</h1>

        <h2>Oops! Page Not Found</h2>

        <p>

            The page you are looking for may have been moved,
            deleted or the URL may be incorrect.

            Please return to the homepage and continue browsing.

        </p>

        <a href="index.html" class="btn404">

            Return to Homepage

        </a>

        <div class="countdown">

            Redirecting automatically in <span id="timer">10</span> seconds...

        </div>

    </div>

<script>

let time = 10;

const timer = document.getElementById("timer");

setInterval(function(){

    time--;

    timer.innerHTML = time;

    if(time<=0){

        window.location.href="index.html";

    }

},1000);

</script>

</body>

</html>
